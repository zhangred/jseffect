<!DOCTYPE>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, width=device-width">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta content="black" name="apple-mobile-web-app-status-bar-style">
	<meta name="format-detection" content="telephone=no">
	<meta content="telephone=no" name="format-detection">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<title>文字转背景图片</title>
</head>
<body>
	<style>
		.cover { position: fixed; left: 0; top: 0; height: 100%; width: 100%; pointer-events: none;}
		.file { position: relative; z-index: 3;}
	</style>
	<div class="cover" id="J_cover"></div>
	<input type="file" id="file" class="file" accept="image/x-png,image/jpeg" />
	<script language="javascript" type="text/javascript" src="main.js"></script>
	<script type="text/javascript">
		window.fileToBase64({
			text: '测试水印文字',
			type: 'text',
			// url: 'http://card.biaotu.net/img02.jpg',
			// url: 'http://card.biaotu.net/testimg02.png',
			// url: 'http://card.biaotu.net/img01.png',
			success: function(res){
				// console.log(res)
				let dom = document.getElementById('J_cover');
				dom.style.backgroundImage = `url(${res})`;
			}
		})

		let file = document.getElementById('file');
		file.addEventListener('change', function(e){
			if (e.target.files[0]) {
				window.fileToBase64({
					text: '测试水印文字',
					type: 'file',
					file: e.target.files[0],
					success: function(res){
						// console.log(res)
						let dom = document.getElementById('J_cover');
						dom.style.backgroundImage = `url(${res})`;
					}
				})
			}
		})

	</script>
</body>
</html>
